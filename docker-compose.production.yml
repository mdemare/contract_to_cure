name: contract_to_cure_production
services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - UID=1000
        - GID=1000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${EXPOSED_PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    restart: unless-stopped
    command: ["bundle", "exec", "puma", "-C", "config/puma.rb"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

name: contracttocure_production
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3103:4567"
    environment:
      - PORT=4567
    env_file:
      - .env
    restart: unless-stopped
    command: ["bundle", "exec", "puma", "-C", "config/puma.rb"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4567/game_state.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pandemic Map City Representation</title>
  <link type="css" src="style.css">
  <script src="all.js"/>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var cities = loadCities(jsonUrl);
      var renderableMap = prepareMapForRendering(cities);
      renderPandemicCities(renderableMap, 200);
      renderConnections(renderableMap);
    });
  </script>
</head>
<body>

  <div class="map-container">
    <svg class="connections-layer" width="100%" height="100%"></svg>
  </div>

</body>
</html>

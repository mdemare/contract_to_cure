upstream contracttocure_mdemare_nl_backend {
    server host.docker.internal:3103;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name contracttocure.mdemare.nl;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name contracttocure.mdemare.nl;

    ssl_certificate /etc/letsencrypt/live/mdemare.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mdemare.nl/privkey.pem;

    # SSL settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri @backend;
        root /home/mdemare/repos/contract_to_cure/engine-room/production/public;
    }

    location @backend {
        proxy_pass http://contracttocure_mdemare_nl_backend;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location /health {
        proxy_pass http://contracttocure_mdemare_nl_backend;
        access_log off;
    }
}
